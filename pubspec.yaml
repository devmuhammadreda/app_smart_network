name: app_smart_network
description: "A smart Flutter network package with built-in error handling, retry logic, and multilingual error messages (en/ar)."
version: 1.1.0
repository: https://github.com/devmuhammadreda/app_smart_network
homepage: https://github.com/devmuhammadreda/app_smart_network

environment:
  sdk: ^3.0.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  connectivity_plus: ^7.0.0
  equatable: ^2.0.8
  pretty_dio_logger: ^1.4.0
  dio_smart_retry: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
